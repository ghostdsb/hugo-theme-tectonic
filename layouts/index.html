{{ define "main" }}
<section class="posts">
  <!-- Neo-Brutalist Filter Buttons -->
  <div class="category-filter">
    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="algorithm">Algorithm</button>
    <button class="filter-btn" data-category="database">Database</button>
    <button class="filter-btn" data-category="gaming">Gaming</button>
  </div>
  
  <ul>
    <!-- Fetch all pages under the "posts" section, sorted by Date descending -->
    {{ $posts := (where .Site.RegularPages "Type" "posts").ByDate.Reverse }}
    {{ range $posts }}
      {{ $tagsString := "" }}
      {{ with .Params.tags }}
        {{ $tagsString = delimit . " " }}
      {{ end }}
      
      <li class="post-item" data-categories="{{ $tagsString | lower }}">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05-07:00" }}">
          {{ .Date.Format "02/01/06" }}
        </time>
      </li>
    {{ end }}
  </ul>
</section>

<!-- Inline Interactive Filtering Script -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const filterButtons = document.querySelectorAll('.filter-btn');
    const posts = document.querySelectorAll('.post-item');
    
    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        const category = button.dataset.category.toLowerCase();
        
        // Update active class state on buttons
        filterButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        
        // Hide/Show matching posts with CSS helper
        posts.forEach(post => {
          const postCats = (post.dataset.categories || "").split(' ');
          if (category === 'all' || postCats.includes(category)) {
            post.classList.remove('hidden');
          } else {
            post.classList.add('hidden');
          }
        });
      });
    });
  });
</script>
{{ end }}
