{{ define "main" }}
<article class="post">
  <!-- Article Main Title -->
  <h2>{{ .Title }}</h2>
  
  <!-- Main Markdown Content -->
  <div class="post-content">
    {{ .Content }}
  </div>
  
  <!-- Post Footer Meta Info -->
  <span class="meta">
    <time datetime="{{ .Date.Format "2006-01-02T15:04:05-07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
  </span>
</article>
{{ end }}
